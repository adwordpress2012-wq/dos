kind = "mobile"
previewPath = "/mobile/"
title = "Directive OS — Command Bridge Mobile"
version = "1.0.0"
id = "artifacts/directive-os-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 18563

[services.development]
run = "pnpm --filter @workspace/directive-os-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/directive-os-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/directive-os-mobile", "run", "serve" ]

[services.env]
PORT = "18563"
BASE_PATH = "/mobile/"
